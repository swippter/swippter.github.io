<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swippter — GitHub</title>
  <meta http-equiv="refresh" content="3; url=https://www.github.com/akk29/swippter">

  <style>
    /* ─── Tokens ─── */
    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #e8ff47;
      --text:      #f0f0f0;
      --muted:     #555;
      --radius:    12px;
      --duration:  3s;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Base ─── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', 'Fira Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 56px;
      width: min(420px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: rise .5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Icon ─── */
    .octocat {
      color: var(--text);
      opacity: .85;
    }

    /* ─── Text block ─── */
    .label {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .title {
      font-family: 'Syne', 'DM Mono', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--text);
      margin-top: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .text-center { text-align: center; }

    /* ─── Progress bar ─── */
    .bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 99px;
      animation: fill var(--duration) linear forwards;
    }

    @keyframes fill {
      to { width: 100%; }
    }

    /* ─── Counter ─── */
    .countdown {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .05em;
    }

    .countdown span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ─── Fallback link ─── */
    .fallback {
      font-size: 12px;
      color: var(--muted);
    }

    .fallback a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }

    .fallback a:hover { border-color: var(--accent); }
  </style>

  <!-- Optional: load Syne for display title -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="card">

    <!-- GitHub icon -->
    <svg class="octocat" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
               0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755
               -1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236
               1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466
               -1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176
               0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405
               2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23
               1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22
               0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295
               24 12c0-6.63-5.37-12-12-12z"/>
    </svg>

    <!-- Text -->
    <div class="text-center">
      <p class="label">Redirecting you to</p>
      <p class="title">Swippter</p>
      <p class="subtitle">github.com/akk29/swippter</p>
    </div>

    <!-- Progress -->
    <div style="width:100%; display:flex; flex-direction:column; gap:10px; align-items:center;">
      <div class="bar-wrap">
        <div class="bar-fill"></div>
      </div>
      <p class="countdown">Taking you there in <span id="sec">3</span>s</p>
    </div>

    <p class="fallback">Not redirected? <a href="https://www.github.com/akk29/swippter">Click here</a></p>

  </div>

  <script>
    /* Countdown ticker */
    let s = 3;
    const el = document.getElementById('sec');
    const t = setInterval(() => {
      s--;
      if (s <= 0) { clearInterval(t); el.textContent = '0'; }
      else el.textContent = s;
    }, 1000);
  </script>

</body>
</html>
